<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한국어">
<meta name="theme-color" content="#f5f0e8">
<title>한국어 Study Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --red: #c0392b;
    --gold: #b8860b;
    --sage: #5a7a5a;
    --muted: #7a6a55;
    --border: #c8b89a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,134,11,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(192,57,43,0.06) 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(200,184,154,0.12) 31px, rgba(200,184,154,0.12) 32px);
  }

  .watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Noto Serif KR', serif;
    font-size: 22vw;
    color: rgba(184,134,11,0.03);
    pointer-events: none;
    white-space: nowrap;
    z-index: 0;
    line-height: 1;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .crest {
    font-family: 'Noto Serif KR', serif;
    font-size: 3.5rem;
    margin-bottom: 0.5rem;
    display: block;
    color: var(--red);
    opacity: 0.85;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    font-weight: 400;
    letter-spacing: 0.03em;
    line-height: 1.15;
    margin-bottom: 0.4rem;
  }

  h1 em {
    font-style: italic;
    color: var(--red);
  }

  .tagline {
    font-family: 'Noto Serif KR', serif;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    display: block;
  }

  .divider {
    width: 60px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.9rem auto 1.2rem;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    margin-bottom: 2.5rem;
  }

  .study-card {
    display: block;
    text-decoration: none;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.8rem;
    text-align: left;
    transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 12px rgba(26,18,8,0.06);
    position: relative;
    overflow: hidden;
  }

  .study-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 11px;
  }

  .study-card.vocab::before {
    background: linear-gradient(135deg, rgba(192,57,43,0.04), rgba(184,134,11,0.04));
  }

  .study-card.numbers::before {
    background: linear-gradient(135deg, rgba(90,122,90,0.05), rgba(184,134,11,0.04));
  }

  .study-card:hover {
    transform: translateY(-3px);
    border-color: var(--gold);
    box-shadow: 0 8px 28px rgba(26,18,8,0.13);
  }

  .study-card:hover::before { opacity: 1; }

  .card-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .card-icon {
    font-size: 2.2rem;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: var(--paper-dark);
    border: 1px solid var(--border);
  }

  .card-text { flex: 1; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  .card-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    line-height: 1.5;
  }

  .card-pills {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }

  .pill {
    padding: 0.18rem 0.55rem;
    border-radius: 20px;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Noto Serif KR';
    border: 1px solid;
  }

  .pill-red   { border-color: rgba(192,57,43,0.3);  color: var(--red);  background: rgba(192,57,43,0.06); }
  .pill-gold  { border-color: rgba(184,134,11,0.3); color: var(--gold); background: rgba(184,134,11,0.06); }
  .pill-sage  { border-color: rgba(90,122,90,0.3);  color: var(--sage); background: rgba(90,122,90,0.06); }

  .card-arrow {
    font-size: 1.1rem;
    color: var(--border);
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
  }
  .study-card:hover .card-arrow {
    transform: translateX(4px);
    color: var(--gold);
  }

  html { -webkit-text-size-adjust: 100%; }
  * { -webkit-tap-highlight-color: transparent; }
  a { touch-action: manipulation; }

  .study-card:active { transform: scale(0.98); opacity: 0.9; }

  @media (hover: none) {
    .study-card:hover { transform: none; border-color: var(--border); box-shadow: 0 2px 12px rgba(26,18,8,0.06); }
    .study-card:hover .card-arrow { transform: none; color: var(--border); }
  }

  @media (max-width: 600px) {
    body { padding: 2rem 1.2rem calc(2rem + env(safe-area-inset-bottom)); padding-top: calc(2rem + env(safe-area-inset-top)); }
    .study-card { padding: 1.2rem 1.4rem; }
    .card-title { font-size: 1.1rem; }
    h1 { font-size: clamp(1.9rem, 8vw, 2.8rem); }
  }
    font-family: 'Noto Serif KR', serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .footer span { color: var(--red); }
</style>
</head>
<body>

<div class="watermark">한국</div>

<div class="content">
  <span class="crest">한</span>
  <h1>한국어 <em>Study</em><br>Suite</h1>
  <div class="divider"></div>
  <span class="tagline">DFSL · Module 1</span>

  <div class="cards">

    <a href="vocab.html" class="study-card vocab">
      <div class="card-inner">
        <div class="card-icon">🃏</div>
        <div class="card-text">
          <div class="card-title">Vocabulary Practice</div>
          <div class="card-subtitle">165 words · flashcards, multiple choice & verb conjugation</div>
          <div class="card-pills">
            <span class="pill pill-red">Flashcards</span>
            <span class="pill pill-gold">Quiz</span>
            <span class="pill pill-sage">Conjugation</span>
          </div>
        </div>
        <div class="card-arrow">→</div>
      </div>
    </a>

    <a href="numbers.html" class="study-card numbers">
      <div class="card-inner">
        <div class="card-icon">🔢</div>
        <div class="card-text">
          <div class="card-title">Number Practice</div>
          <div class="card-subtitle">Sino-Korean & Native Korean · reading and writing numbers</div>
          <div class="card-pills">
            <span class="pill pill-sage">Sino-Korean</span>
            <span class="pill pill-gold">Native Korean</span>
            <span class="pill pill-red">Quiz</span>
          </div>
        </div>
        <div class="card-arrow">→</div>
      </div>
    </a>

  </div>

  <div class="footer">Made for <span>한국어</span> learners · DFSL</div>
</div>

</body>
</html>
