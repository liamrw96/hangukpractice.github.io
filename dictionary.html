<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한국어 Dictionary">
<meta name="theme-color" content="#f5f0e8">
<title>Korean Dictionary · TOPIK 6000</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --red: #c0392b;
    --gold: #b8860b;
    --sage: #5a7a5a;
    --muted: #7a6a55;
    --border: #c8b89a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }
  * { -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(200,184,154,0.12) 31px, rgba(200,184,154,0.12) 32px);
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 1.5rem 1.5rem 1.2rem;
    padding-top: calc(1.5rem + env(safe-area-inset-top));
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 16px rgba(26,18,8,0.2);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 860px;
    margin: 0 auto;
  }

  .home-link {
    color: rgba(245,240,232,0.5);
    text-decoration: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    white-space: nowrap;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .home-link:hover { color: var(--paper); }

  .header-title {
    flex: 1;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 400;
    color: var(--paper);
    line-height: 1.2;
  }
  h1 em { font-style: italic; color: var(--gold); }

  .header-sub {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.72rem;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.15rem;
  }

  .controls {
    max-width: 860px;
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    position: sticky;
    top: calc(72px + env(safe-area-inset-top));
    z-index: 9;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--paper-dark);
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 0.65rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    line-height: 1;
    display: none;
  }
  .search-clear.visible { display: block; }

  .sort-btns { display: flex; gap: 0.4rem; }

  .sort-btn {
    padding: 0.55rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--paper-dark);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    touch-action: manipulation;
    min-height: 44px;
  }
  .sort-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .pos-filter {
    max-width: 860px;
    margin: 0 auto;
    padding: 0.7rem 1.5rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }

  .pos-btn {
    padding: 0.28rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    touch-action: manipulation;
    min-height: 32px;
  }
  .pos-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 600; }

  .result-bar {
    max-width: 860px;
    margin: 0 auto;
    padding: 0.55rem 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'Noto Serif KR', serif;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }

  .table-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem calc(3rem + env(safe-area-inset-bottom));
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Noto Serif KR', serif;
  }

  thead th {
    background: var(--ink);
    color: var(--paper);
    padding: 0.7rem 1rem;
    text-align: left;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: sticky;
    top: 0;
  }
  thead th:last-child { text-align: right; }

  tbody tr:nth-child(even) td { background: var(--paper-dark); }
  tbody tr:hover td { background: rgba(184,134,11,0.07); }

  td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid rgba(200,184,154,0.35);
    vertical-align: top;
    font-size: 0.9rem;
  }
  tbody tr:last-child td { border-bottom: none; }

  .td-ko {
    font-size: 1.05rem;
    color: var(--ink);
    font-weight: 500;
    white-space: nowrap;
    width: 28%;
  }
  .td-en {
    color: #3a2e22;
    line-height: 1.45;
  }
  .td-pos { text-align: right; white-space: nowrap; width: 14%; }

  .pos-tag {
    display: inline-block;
    font-size: 0.67rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    background: var(--paper-dark);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .no-results {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'Noto Serif KR', serif;
  }
  .no-results strong { color: var(--ink); font-style: normal; }

  .load-more-row td {
    text-align: center;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    border-bottom: none;
  }

  @media (hover: none) {
    .sort-btn:hover { background: var(--paper-dark); color: var(--muted); border-color: var(--border); }
    .sort-btn.active:hover { background: var(--ink); color: var(--paper); }
    .pos-btn:hover { background: transparent; color: var(--muted); border-color: var(--border); }
    .pos-btn.active:hover { background: var(--gold); color: #fff; }
  }

  button:active { opacity: 0.75; transform: scale(0.97); }

  @media (max-width: 600px) {
    header { padding: 1rem 1rem 0.9rem; padding-top: calc(1rem + env(safe-area-inset-top)); }
    .controls { padding: 0.8rem 1rem; top: calc(62px + env(safe-area-inset-top)); }
    .pos-filter { padding: 0.6rem 1rem; }
    .result-bar { padding: 0.5rem 1rem; }
    .table-wrap { padding: 0 0 calc(3rem + env(safe-area-inset-bottom)); }
    .search-input { font-size: 16px !important; }
    .sort-btn { padding: 0.5rem 0.7rem; font-size: 0.75rem; }
    td { padding: 0.5rem 0.7rem; }
    .td-ko { font-size: 0.95rem; }
    .td-en { font-size: 0.82rem; }
    .td-pos { width: 18%; }
    .pos-tag { font-size: 0.62rem; padding: 0.12rem 0.4rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html" class="home-link">← Home</a>
    <div class="header-title">
      <h1>Korean <em>Dictionary</em></h1>
      <div class="header-sub">TOPIK · 5,709 words</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="Search Korean or English…"
      oninput="onSearch()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="sort-btns">
    <button class="sort-btn active" id="sort-ko" onclick="setSort('ko')">가→힣</button>
    <button class="sort-btn" id="sort-en" onclick="setSort('en')">A→Z</button>
  </div>
</div>

<div class="pos-filter" id="pos-filter"></div>
<div class="result-bar" id="result-bar"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Korean</th>
        <th>English</th>
        <th style="text-align:right">Type</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

const topikVocab = _raw.map(r => ({k:r[0],e:r[1],p:r[2]}));

// ── State ──────────────────────────────────────────────────────────────────
let sortMode   = 'ko';
let filterPos  = 'all';
let query      = '';
const PAGE     = 200;
let showing    = PAGE;
let filtered   = [];

// ── POS config ─────────────────────────────────────────────────────────────
const POS_LIST = ['all','noun','verb','adjective','adverb','expression',
                  'auxiliary verb','pronoun','numeral','interjection'];
const POS_LABEL = {
  all:'All', noun:'Noun', verb:'Verb', adjective:'Adjective',
  adverb:'Adverb', expression:'Expression', 'auxiliary verb':'Aux. Verb',
  pronoun:'Pronoun', numeral:'Numeral', interjection:'Interjection'
};

// ── Init ───────────────────────────────────────────────────────────────────
(function init() {
  const pf = document.getElementById('pos-filter');
  POS_LIST.forEach(pos => {
    const btn = document.createElement('button');
    btn.className = 'pos-btn' + (pos === 'all' ? ' active' : '');
    btn.textContent = POS_LABEL[pos] || pos;
    btn.dataset.pos = pos;
    btn.onclick = () => {
      filterPos = pos;
      document.querySelectorAll('.pos-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.pos === pos));
      showing = PAGE;
      render();
    };
    pf.appendChild(btn);
  });
  render();
})();

// ── Handlers ───────────────────────────────────────────────────────────────
function setSort(mode) {
  sortMode = mode;
  document.getElementById('sort-ko').classList.toggle('active', mode === 'ko');
  document.getElementById('sort-en').classList.toggle('active', mode === 'en');
  showing = PAGE;
  render();
}

function onSearch() {
  query = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', query.length > 0);
  showing = PAGE;
  render();
}

function clearSearch() {
  document.getElementById('search').value = '';
  query = '';
  document.getElementById('search-clear').classList.remove('visible');
  showing = PAGE;
  render();
}

// ── Core render ────────────────────────────────────────────────────────────
function render() {
  // Filter
  filtered = topikVocab.filter(v => {
    if (filterPos !== 'all' && v.p !== filterPos) return false;
    if (query) {
      return v.k.toLowerCase().includes(query) || v.e.toLowerCase().includes(query);
    }
    return true;
  });

  // Sort
  if (sortMode === 'ko') {
    filtered.sort((a, b) => a.k.localeCompare(b.k, 'ko'));
  } else {
    filtered.sort((a, b) => a.e.localeCompare(b.e, 'en', {sensitivity: 'base'}));
  }

  // Result bar
  const rb = document.getElementById('result-bar');
  rb.textContent = filtered.length === topikVocab.length
    ? filtered.length.toLocaleString() + ' words'
    : filtered.length.toLocaleString() + ' of ' + topikVocab.length.toLocaleString() + ' words';

  renderRows();
}

function renderRows() {
  const tbody = document.getElementById('tbody');
  const slice = filtered.slice(0, showing);

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="no-results">No results for <strong>' + query + '</strong></td></tr>';
    return;
  }

  let html = slice.map(v => {
    const ko = v.k.replace(/</g, '&lt;');
    const en = v.e.replace(/</g, '&lt;');
    return `<tr><td class="td-ko">${ko}</td><td class="td-en">${en}</td><td class="td-pos"><span class="pos-tag">${v.p}</span></td></tr>`;
  }).join('');

  if (showing < filtered.length) {
    const remain = filtered.length - showing;
    html += `<tr class="load-more-row"><td colspan="3">Showing ${showing.toLocaleString()} of ${filtered.length.toLocaleString()} — <a href="#" onclick="loadMore(event)" style="color:var(--gold)">Load ${Math.min(remain, PAGE)} more</a></td></tr>`;
  }

  tbody.innerHTML = html;
}

function loadMore(e) {
  e.preventDefault();
  showing += PAGE;
  renderRows();
}
</script>
